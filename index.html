<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000008">
<title>מגלי היקום</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Heebo:wght@300;400;700&display=swap');

:root {
  --gold:    #f0d080;
  --gold2:   #c8a040;
  --cyan:    #50eeff;
  --crimson: #ff4466;
  --green:   #44ffaa;
  --void:    #000008;
  --deep:    #04080f;
  --dim:     #2a3a5a;
  --mid:     #5060a0;
  --panel:   rgba(3,6,18,0.88);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:var(--void); color:#fff; font-family:'Heebo',sans-serif; user-select:none; }

/* ══ JWST REVEAL ══ */
#reveal-stage { position:fixed; inset:0; z-index:0; overflow:hidden; }
#jwst-img {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; filter:saturate(1.5) brightness(0.85); opacity:1;
}
#mask-canvas { position:absolute; inset:0; width:100%; height:100%; z-index:1; }

/* ══ OVERLAYS ══ */
#vignette {
  position:fixed; inset:0; z-index:2; pointer-events:none;
  background:radial-gradient(ellipse 80% 80% at 50% 50%,
    transparent 0%, rgba(0,0,12,0.5) 52%, rgba(0,0,12,0.97) 100%);
}
#scanlines { position:fixed; inset:0; z-index:3; pointer-events:none; opacity:0.025;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.1) 2px,rgba(255,255,255,0.1) 3px); }

/* ══ COSMIC EVENT ══ */
#evt-overlay { position:fixed; inset:0; z-index:60; pointer-events:none;
  display:flex; align-items:center; justify-content:center; opacity:0; }
#evt-overlay.show { animation:ev-life 4.5s ease-out forwards; }
@keyframes ev-life { 0%{opacity:0} 10%{opacity:1} 75%{opacity:1} 100%{opacity:0} }
.ev-wrap { text-align:center; animation:ev-s 4.5s ease-out forwards; }
@keyframes ev-s {
  0%{transform:scale(0.4);filter:blur(20px)}
  14%{transform:scale(1.03);filter:blur(0)}
  80%{transform:scale(1)} 100%{transform:scale(1.1);filter:blur(6px)} }
.ev-name { font-family:'Cinzel',serif; font-size:clamp(2rem,8vw,4.5rem); font-weight:900;
  letter-spacing:0.25em; text-transform:uppercase;
  text-shadow:0 0 60px currentColor,0 0 120px currentColor,0 0 200px currentColor; margin-bottom:10px; }
.ev-desc { font-size:clamp(0.7rem,2vw,0.95rem); letter-spacing:0.35em; color:var(--mid); text-transform:uppercase; }

/* ══ BIG BANG ══ */
#bigbang { position:fixed; inset:0; z-index:200; background:var(--void);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
  opacity:0; pointer-events:none; }
#bigbang.active { pointer-events:all; animation:bb-life 5.5s ease-in-out forwards; }
@keyframes bb-life { 0%{opacity:0} 10%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
.bb-ring { position:absolute; border-radius:50%; border:1.5px solid var(--gold); animation:bb-r 4s ease-out forwards; opacity:0; }
@keyframes bb-r { 0%{width:0;height:0;opacity:1} 100%{width:260vmax;height:260vmax;opacity:0;border-color:var(--cyan)} }
.bb-sup { font-family:'Cinzel',serif; font-size:clamp(0.7rem,2vw,1rem); letter-spacing:0.5em; color:var(--gold); z-index:1; text-align:center; }
.bb-name { font-family:'Cinzel',serif; font-size:clamp(1.5rem,5vw,3.5rem); font-weight:900; letter-spacing:0.3em; color:#fff;
  text-shadow:0 0 80px var(--gold),0 0 160px rgba(240,208,128,0.4); z-index:1; text-align:center; }

/* ══ RIGHT SIDE PANEL ══ */
#side-panel {
  position:fixed;
  left:clamp(8px,1.5vw,16px);
  top:50%; transform:translateY(-50%);
  z-index:12;
  width:clamp(145px,19vw,185px);
  display:flex; flex-direction:column; gap:0;
  pointer-events:all;
}

/* Tab bar */
.tabs {
  display:flex; gap:0;
  margin-bottom:0;
  border-bottom:1px solid rgba(240,208,128,0.1);
}
.tab-btn {
  flex:1; padding:6px 0;
  background:transparent;
  border:none; border-bottom:2px solid transparent;
  color:var(--dim); font-size:0.52rem; letter-spacing:0.2em;
  text-transform:uppercase; cursor:pointer;
  font-family:'Heebo',sans-serif;
  transition:all 0.2s;
  margin-bottom:-1px;
}
.tab-btn.active {
  color:var(--gold);
  border-bottom-color:var(--gold);
  text-shadow:0 0 12px rgba(240,208,128,0.5);
}
.tab-btn:hover:not(.active) { color:var(--mid); }

/* Tab content */
.tab-pane { display:none; }
.tab-pane.active { display:block; }

/* ── LEADERBOARD TAB ── */
.lb-header {
  font-size:0.52rem; letter-spacing:0.3em; color:var(--dim);
  text-transform:uppercase; padding:8px 0 6px;
}
.lb-row {
  display:flex; align-items:center; gap:6px;
  padding:5px 8px 5px 10px; margin-bottom:3px;
  background:rgba(4,8,20,0.75);
  border-left:2px solid rgba(240,208,128,0.2);
  backdrop-filter:blur(4px);
  transition:border-color 0.3s;
}
.lb-row.me { border-left-color:var(--gold); }
.lb-row.top { border-left-color:#ffd700; }
.lb-rank { font-family:'Cinzel',serif; font-size:0.62rem; min-width:14px; }
.lb-rank.r1 { color:#ffd700; text-shadow:0 0 10px #ffd700; }
.lb-rank.r2 { color:#c0c0c0; }
.lb-rank.r3 { color:#cd7f32; }
.lb-rank.rx { color:var(--dim); }
.lb-name { font-size:0.58rem; color:#bbb; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.lb-name.me { color:var(--gold); font-weight:700; }
.lb-score { font-family:'Cinzel',serif; font-size:0.58rem; color:var(--mid); }

/* ── TIMELINE TAB ── */
.tl-wrap { padding-top:8px; display:flex; flex-direction:column; gap:0; max-height:260px; overflow:hidden; }
.tl-item {
  display:flex; gap:8px; align-items:flex-start;
  padding-bottom:10px; position:relative;
}
.tl-item::before {
  content:''; position:absolute;
  left:initial; right:4px; top:16px; bottom:0;
  width:1px; background:linear-gradient(to bottom, rgba(240,208,128,0.3), transparent);
}
.tl-item:last-child::before { display:none; }
.tl-dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
  margin-top:3px;
  box-shadow:0 0 8px currentColor;
}
.tl-content { flex:1; }
.tl-event-name { font-size:0.6rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; line-height:1.2; }
.tl-at { font-size:0.52rem; color:var(--dim); letter-spacing:0.1em; margin-top:1px; }
.tl-future { opacity:0.3; }
.tl-future .tl-dot { background:var(--dim) !important; box-shadow:none; }

/* ── MESSAGES TAB ── */
.msg-feed { display:flex; flex-direction:column; gap:0; padding-top:6px; }
.msg-item {
  padding:6px 8px; margin-bottom:4px;
  background:rgba(4,8,20,0.75);
  border-right:2px solid rgba(80,238,255,0.2);
  backdrop-filter:blur(4px);
  animation:msg-in 0.5s ease-out;
}
@keyframes msg-in { from{opacity:0;transform:translateX(12px)} to{opacity:1;transform:none} }
.msg-meta { display:flex; justify-content:space-between; margin-bottom:2px; }
.msg-name { font-size:0.52rem; color:var(--cyan); letter-spacing:0.08em; }
.msg-time { font-size:0.48rem; color:var(--dim); }
.msg-text { font-size:0.6rem; color:#ccc; line-height:1.4; word-break:break-word; }

/* Message input */
.msg-input-wrap {
  margin-top:6px; display:flex; gap:4px;
}
.msg-input {
  flex:1; background:rgba(4,8,20,0.8);
  border:1px solid rgba(80,238,255,0.15);
  color:#fff; font-size:0.6rem; font-family:'Heebo',sans-serif;
  padding:5px 7px; outline:none; letter-spacing:0.05em;
  transition:border-color 0.2s;
  direction:rtl;
}
.msg-input:focus { border-color:rgba(80,238,255,0.4); }
.msg-send {
  padding:5px 8px; background:rgba(80,238,255,0.08);
  border:1px solid rgba(80,238,255,0.2); color:var(--cyan);
  font-size:0.7rem; cursor:pointer; transition:all 0.15s;
  font-family:'Heebo',sans-serif;
}
.msg-send:hover { background:rgba(80,238,255,0.18); border-color:var(--cyan); }

/* ══ MAIN UI ══ */
#ui { position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column; justify-content:space-between;
  padding:clamp(14px,3vw,26px); pointer-events:none; }

/* TOP */
#top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.top-block { display:flex; flex-direction:column; gap:3px; }
.lbl { font-size:clamp(0.48rem,1.1vw,0.58rem); letter-spacing:0.4em; color:var(--dim); text-transform:uppercase; }
.uni-name { font-family:'Cinzel',serif; font-size:clamp(0.85rem,2.5vw,1.2rem); font-weight:700;
  letter-spacing:0.2em; color:var(--gold);
  text-shadow:0 0 25px rgba(240,208,128,0.6),0 0 50px rgba(240,208,128,0.2); }
.uni-gen { font-size:clamp(0.46rem,1vw,0.56rem); letter-spacing:0.25em; color:var(--dim); }
.live-dot { display:inline-block; width:6px; height:6px; border-radius:50%;
  background:var(--green); box-shadow:0 0 8px var(--green); margin-left:6px;
  animation:ldot 1.8s ease-in-out infinite; }
@keyframes ldot { 0%,100%{opacity:0.3;transform:scale(0.7)} 50%{opacity:1;transform:scale(1.2)} }
.live-count { font-family:'Cinzel',serif; font-size:clamp(0.85rem,2.5vw,1.1rem);
  color:var(--green); display:flex; align-items:center; justify-content:flex-end;
  text-shadow:0 0 15px rgba(68,255,170,0.5); }

/* BOTTOM */
#bottom { display:flex; flex-direction:column; align-items:center; gap:clamp(10px,2.5vh,18px); }

/* Progress */
#prog-wrap { width:min(440px,80vw); }
.prog-top { display:flex; justify-content:space-between; margin-bottom:6px; }
.prog-top span { font-size:clamp(0.52rem,1.3vw,0.65rem); letter-spacing:0.15em; color:var(--dim); text-transform:uppercase; }
.prog-next-val { color:var(--cyan) !important; text-shadow:0 0 12px rgba(80,238,255,0.5); }
.prog-bar { position:relative; height:4px; background:rgba(255,255,255,0.05); border-radius:2px; }
.prog-fill {
  height:100%; border-radius:2px;
  background:linear-gradient(90deg,#051525,var(--cyan));
  box-shadow:0 0 12px var(--cyan),0 0 24px rgba(80,238,255,0.3);
  transition:width 0.7s cubic-bezier(.4,0,.2,1); position:relative;
}
.prog-fill::after {
  content:''; position:absolute; right:-1px; top:-4px;
  width:6px; height:12px; border-radius:2px;
  background:var(--cyan); box-shadow:0 0 12px var(--cyan),0 0 24px var(--cyan);
}
.m-dot { position:absolute; top:50%; transform:translate(-50%,-50%);
  width:6px; height:6px; border-radius:50%;
  border:1px solid rgba(240,208,128,0.3); background:var(--deep); transition:all 0.5s; }
.m-dot.done { background:var(--gold); border-color:var(--gold); box-shadow:0 0 8px var(--gold),0 0 16px rgba(240,208,128,0.4); }

/* Stats */
.stats { display:flex; gap:clamp(18px,5vw,44px); align-items:center; }
.stat  { display:flex; flex-direction:column; align-items:center; gap:2px; }
.stat-val {
  font-family:'Cinzel',serif; font-size:clamp(1.4rem,5.5vw,2.4rem); font-weight:700;
  color:var(--gold); line-height:1;
  text-shadow:0 0 30px rgba(240,208,128,0.5),0 0 60px rgba(240,208,128,0.2);
  transition:transform 0.1s,color 0.1s,text-shadow 0.1s;
}
.stat-val.bump { transform:scale(1.22); color:#fff; text-shadow:0 0 40px #fff,0 0 80px rgba(255,255,255,0.4); }
.stat-lbl { font-size:clamp(0.46rem,1.1vw,0.56rem); letter-spacing:0.25em; color:var(--dim); text-transform:uppercase; }

/* Button area */
#btn-area { position:relative; pointer-events:all; display:flex; align-items:center; justify-content:center; }
.orbit { position:absolute; border-radius:50%; border:1px solid rgba(80,238,255,0.1);
  animation:spin var(--spd,10s) linear infinite var(--dir,normal); }
.orbit::before { content:''; position:absolute; top:-3px; left:50%; width:5px; height:5px; border-radius:50%;
  background:var(--cyan); box-shadow:0 0 10px var(--cyan),0 0 20px var(--cyan); transform:translateX(-50%); }
.orbit.gold-ring { border-color:rgba(240,208,128,0.08); }
.orbit.gold-ring::before { background:var(--gold); box-shadow:0 0 10px var(--gold); }
@keyframes spin { to{transform:rotate(360deg)} }
.aura-1 { position:absolute; inset:-20px; border-radius:50%;
  background:radial-gradient(circle,rgba(80,238,255,0.06) 0%,transparent 70%);
  animation:aura 2.5s ease-in-out infinite; }
.aura-2 { position:absolute; inset:-40px; border-radius:50%;
  background:radial-gradient(circle,rgba(240,208,128,0.04) 0%,transparent 65%);
  animation:aura 3.5s ease-in-out infinite reverse; }
@keyframes aura { 0%,100%{transform:scale(0.85);opacity:0.4} 50%{transform:scale(1.1);opacity:1} }

.ripple { position:absolute; border-radius:50%; border:1px solid var(--cyan); pointer-events:none;
  animation:ripple-out 1s ease-out forwards; }
@keyframes ripple-out {
  0%{width:0;height:0;opacity:0.8;border-color:var(--cyan);box-shadow:0 0 20px var(--cyan)}
  50%{border-color:var(--gold)}
  100%{width:300px;height:300px;opacity:0} }

#btn {
  position:relative; z-index:1;
  width:clamp(100px,18vw,128px); height:clamp(100px,18vw,128px);
  border-radius:50%;
  border:1.5px solid rgba(240,208,128,0.3);
  background:
    radial-gradient(circle at 35% 28%,rgba(240,208,128,0.09) 0%,transparent 55%),
    radial-gradient(circle at 65% 72%,rgba(80,238,255,0.05) 0%,transparent 50%),
    rgba(3,6,16,0.92);
  color:var(--gold); font-family:'Cinzel',serif;
  font-size:clamp(0.46rem,1.2vw,0.6rem); letter-spacing:0.2em; text-transform:uppercase;
  cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px;
  box-shadow:0 0 30px rgba(240,208,128,0.07),0 0 60px rgba(80,238,255,0.03),inset 0 1px 0 rgba(255,255,255,0.05);
  transition:all 0.12s; touch-action:manipulation;
}
.btn-icon { font-size:clamp(1.2rem,3vw,1.6rem); line-height:1; filter:drop-shadow(0 0 8px var(--gold)); }
#btn:hover { border-color:rgba(240,208,128,0.7);
  box-shadow:0 0 60px rgba(240,208,128,0.2),0 0 120px rgba(80,238,255,0.08),inset 0 1px 0 rgba(255,255,255,0.1);
  transform:scale(1.04); color:#fff; }
#btn:active { transform:scale(0.88);
  box-shadow:0 0 80px rgba(240,208,128,0.5),0 0 160px rgba(80,238,255,0.3),0 0 240px rgba(240,208,128,0.2),inset 0 0 40px rgba(240,208,128,0.15);
  border-color:var(--gold); }
#btn.clicked { animation:btn-pulse 0.5s ease-out; }
@keyframes btn-pulse {
  0%{box-shadow:0 0 0 rgba(240,208,128,0)}
  30%{box-shadow:0 0 80px rgba(240,208,128,0.7),0 0 160px rgba(80,238,255,0.5),0 0 240px rgba(240,208,128,0.3)}
  100%{box-shadow:0 0 30px rgba(240,208,128,0.07)} }

.shockwave { position:fixed; pointer-events:none; z-index:25; border-radius:50%;
  border:2px solid rgba(240,208,128,0.8);
  box-shadow:0 0 30px rgba(240,208,128,0.5),inset 0 0 20px rgba(240,208,128,0.2);
  transform:translate(-50%,-50%) scale(0);
  animation:shock-out 0.8s ease-out forwards; }
@keyframes shock-out {
  0%{transform:translate(-50%,-50%) scale(0);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1);opacity:0;width:400px;height:400px} }

.star-burst { position:fixed; pointer-events:none; z-index:26;
  font-size:clamp(0.8rem,2vw,1.1rem); color:var(--gold);
  text-shadow:0 0 10px var(--gold),0 0 20px var(--gold);
  animation:star-fly var(--dur) ease-out forwards; font-family:'Cinzel',serif; }
@keyframes star-fly { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.3)} }

.streak-row { display:flex; align-items:center; gap:8px;
  font-size:clamp(0.5rem,1.2vw,0.6rem); letter-spacing:0.2em; color:var(--dim); text-transform:uppercase; }
.streak-n { font-family:'Cinzel',serif; font-size:clamp(0.72rem,2vw,0.88rem); color:var(--crimson); text-shadow:0 0 12px rgba(255,68,102,0.5); }

/* ══ TOASTS ══ */
#toasts { position:fixed; bottom:clamp(20px,5vw,35px); left:50%; transform:translateX(-50%);
  z-index:90; pointer-events:none; display:flex; flex-direction:column; align-items:center; gap:6px; }
.toast { background:rgba(3,6,16,0.96); border:1px solid rgba(240,208,128,0.25); color:var(--gold);
  font-size:clamp(0.65rem,1.8vw,0.82rem); letter-spacing:0.1em; padding:9px 22px; white-space:nowrap;
  box-shadow:0 0 22px rgba(240,208,128,0.12); backdrop-filter:blur(8px);
  animation:toast-life 3.8s ease-out forwards; }
@keyframes toast-life {
  0%{opacity:0;transform:translateY(8px) scale(0.95)} 12%{opacity:1;transform:none}
  72%{opacity:1} 100%{opacity:0;transform:translateY(-6px)} }

/* ══ PARTICLES ══ */
.pt { position:fixed; pointer-events:none; z-index:30; border-radius:50%; animation:pt-go var(--d) ease-out forwards; }
@keyframes pt-go { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)} }

/* ══ LOAD ══ */
#load { position:fixed; inset:0; z-index:999; background:var(--void);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
  transition:opacity 0.9s; }
#load.out { opacity:0; pointer-events:none; }
.load-t { font-family:'Cinzel',serif; font-size:clamp(1.2rem,5vw,2.2rem); font-weight:900;
  letter-spacing:0.4em; color:var(--gold); text-shadow:0 0 50px rgba(240,208,128,0.5); }
.load-s { font-size:clamp(0.55rem,1.4vw,0.68rem); letter-spacing:0.5em; color:var(--dim);
  text-transform:uppercase; animation:blink 1.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }

/* ══ MOBILE: hide side panel on small screens ══ */
@media (max-width:640px) {
  #side-panel { display:none; }
  #prog-wrap { width:90vw; }
}
</style>
</head>
<body>

<div id="load"><div class="load-t">מגלי היקום</div><div class="load-s">טוען את הקוסמוס...</div></div>

<!-- JWST REVEAL -->
<div id="reveal-stage">
  <img id="jwst-img" alt="James Webb Space Telescope" crossorigin="anonymous">
  <canvas id="mask-canvas"></canvas>
</div>
<div id="vignette"></div>
<div id="scanlines"></div>

<!-- COSMIC EVENT -->
<div id="evt-overlay">
  <div class="ev-wrap">
    <div class="ev-name" id="ev-name">SUPERNOVA</div>
    <div class="ev-desc" id="ev-desc"></div>
  </div>
</div>

<!-- BIG BANG -->
<div id="bigbang">
  <div class="bb-ring" style="animation-delay:0s"></div>
  <div class="bb-ring" style="animation-delay:0.5s"></div>
  <div class="bb-ring" style="animation-delay:1s"></div>
  <div class="bb-ring" style="animation-delay:1.6s"></div>
  <div class="bb-sup" id="bb-sup">יקום נחשף במלואו — יקום חדש נולד</div>
  <div class="bb-name" id="bb-name"></div>
</div>

<!-- SIDE PANEL (left on RTL = right visually) -->
<div id="side-panel">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('lb')">🏆 טופ</button>
    <button class="tab-btn" onclick="switchTab('tl')">⏳ ציר</button>
    <button class="tab-btn" onclick="switchTab('msg')">💬 קהל</button>
  </div>

  <!-- LEADERBOARD -->
  <div class="tab-pane active" id="tab-lb">
    <div class="lb-header">חוקרי היקום הפעילים</div>
    <div id="lb-rows"></div>
  </div>

  <!-- TIMELINE -->
  <div class="tab-pane" id="tab-tl">
    <div class="tl-wrap" id="tl-wrap"></div>
  </div>

  <!-- MESSAGES -->
  <div class="tab-pane" id="tab-msg">
    <div class="msg-feed" id="msg-feed"></div>
    <div class="msg-input-wrap">
      <input class="msg-input" id="msg-input" placeholder="כתוב..." maxlength="60">
      <button class="msg-send" onclick="sendMessage()">→</button>
    </div>
  </div>
</div>

<!-- MAIN UI -->
<div id="ui">
  <div id="top">
    <div class="top-block">
      <div class="lbl">יקום פעיל</div>
      <div class="uni-name" id="uni-name">—</div>

      <div class="lbl">חוקרים עכשיו</div>
      <div class="live-count"><span class="live-dot"></span><span id="live-count">—</span></div>
      <div class="lbl" style="font-size:0.46rem">ברחבי הגלקסיה</div>
    </div>
  </div>

  <div></div>

  <div id="bottom">
    <div id="prog-wrap">
      <div class="prog-top">
        <span>חשיפת היקום</span>
        <span class="prog-next-val" id="prog-next">—</span>

      <div class="stat"><div class="stat-val" id="s-clicks">0</div><div class="stat-lbl">לחיצות כלל</div></div>

      <div class="orbit gold-ring" style="width:196px;height:196px;--spd:22s;--dir:reverse"></div>
      <div class="orbit" style="width:232px;height:232px;--spd:36s;border-color:rgba(240,208,128,0.04)"></div>

      <span>🔥</span>

      <span>ימים רצופים</span>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script>
// ═══════════════════════════════════════
// CONFIG — הכנס את ה-Firebase URL שלך
// ═══════════════════════════════════════
const FIREBASE_URL = ''; // e.g. https://YOUR-PROJECT-default-rtdb.firebaseio.com

const UNIVERSE_TARGET = 10000;
const MAX_CPS         = 8;
const MIN_MS          = 120;

const JWST = [
  { url:'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Carina_Nebula_by_JWST.jpg/1280px-Carina_Nebula_by_JWST.jpg', name:'ערפילית קרינה' },
  { url:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Webb%27s_First_Deep_Field.jpg/1280px-Webb%27s_First_Deep_Field.jpg', name:'שדה עמוק — JWST' },
  { url:'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Pillars_of_Creation_%28NIRCam_Image%29.jpg/1280px-Pillars_of_Creation_%28NIRCam_Image%29.jpg', name:'עמודי הבריאה' },
  { url:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Cartwheel_Galaxy_%28NIRCam_and_MIRI_Composite_Image%29.jpg/1280px-Cartwheel_Galaxy_%28NIRCam_and_MIRI_Composite_Image%29.jpg', name:'גלקסיית גלגל העגלה' },
  { url:'https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Southern_Ring_Nebula_by_JWST.jpg/1280px-Southern_Ring_Nebula_by_JWST.jpg', name:'ערפילית הטבעת הדרומית' },
  { url:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Stephan%27s_Quintet_by_JWST_%28NIRCam%2C_full%29.jpg/1280px-Stephan%27s_Quintet_by_JWST_%28NIRCam%2C_full%29.jpg', name:'קווינטט שטפן' },
];

const MILESTONES = [
  { at:500,   name:'NEBULA',            he:'ערפילית נולדת',  color:'#8855ff', desc:'ענן גז ואבק קוסמי' },
  { at:1500,  name:'PULSAR',            he:'פולסר מסתובב',   color:'#44ddff', desc:'קרינה קוסמית בקצב מדויק' },
  { at:3000,  name:'SUPERNOVA',         he:'סופרנובה!',       color:'#ff7030', desc:'כוכב מתפוצץ — מיליארד שמשות' },
  { at:5000,  name:'QUASAR',            he:'קוואזר בוהק',    color:'#ffcc20', desc:'ליבת גלקסיה בלהב' },
  { at:8000,  name:'BLACK HOLE',        he:'חור שחור',        color:'#ccccff', desc:'שובר הזמן והמרחב' },
  { at:10000, name:'UNIVERSE REVEALED', he:'היקום נחשף!',    color:'#f0d080', desc:'כל פיקסל נחשף — יקום חדש נולד' },
];

const UNI_NAMES = ['ALPHA PRIME','KEPLER VOID','ANDROMEDA-7','SIRIUS DEEP',
  'NOVA TERMINUS','CYGNUS BELT','LYRA EXPANSE','VEGA HORIZON',
  'ORION GATE','HUBBLE FIELD','ETHER REACH','COSMOS ZERO'];
const GEN_HE = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שביעי','שמיני','תשיעי','עשירי'];

// ═══════════════════════════════════════
// MASK
// ═══════════════════════════════════════
const maskC   = document.getElementById('mask-canvas');
const maskCtx = maskC.getContext('2d');
const imgEl   = document.getElementById('jwst-img');
let circles   = [];

function resizeMask() {
  maskC.width=window.innerWidth; maskC.height=window.innerHeight; rebuildMask();
}
function revealR() { return Math.min(window.innerWidth,window.innerHeight)*0.048; }

function rebuildMask() {
  maskCtx.clearRect(0,0,maskC.width,maskC.height);
  maskCtx.fillStyle='rgba(0,0,12,1)';
  maskCtx.fillRect(0,0,maskC.width,maskC.height);
  maskCtx.globalCompositeOperation='destination-out';
  for (const c of circles) {
    const g=maskCtx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r);
    g.addColorStop(0,'rgba(0,0,0,1)'); g.addColorStop(0.65,'rgba(0,0,0,0.95)'); g.addColorStop(1,'rgba(0,0,0,0)');
    maskCtx.fillStyle=g; maskCtx.beginPath(); maskCtx.arc(c.x,c.y,c.r,0,Math.PI*2); maskCtx.fill();
  }
  maskCtx.globalCompositeOperation='source-over';
}

function addRevealCircle() {
  const x=Math.random()*window.innerWidth;
  const y=Math.random()*window.innerHeight;
  const r=revealR()*(0.7+Math.random()*0.9);
  circles.push({x,y,r, xp:x/window.innerWidth, yp:y/window.innerHeight, rp:r/Math.min(window.innerWidth,window.innerHeight)});
  rebuildMask();
}

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let state = {
  totalClicks:0, uClicks:0, uIndex:0,
  generation:0, doneUniverses:0,
  leaderboard:[], messages:[],
  timelineEvents:[],
};
let myName='', myClicks=0;
let lastClickTime=0, clicksThisSec=0, secStart=Date.now();
let transitioning=false, lastMilestone=-1;

// ═══════════════════════════════════════
// DB HELPERS
// ═══════════════════════════════════════
async function dbGet(path) {
  if (!FIREBASE_URL) { try { return JSON.parse(localStorage.getItem('cv4-'+path)||'null'); } catch(e){ return null; } }
  try { const r=await fetch(`${FIREBASE_URL}/${path}.json`); return await r.json(); } catch(e){ return null; }
}
async function dbSet(path,data) {
  if (!FIREBASE_URL) { try{ localStorage.setItem('cv4-'+path,JSON.stringify(data)); }catch(e){} return; }
  try { await fetch(`${FIREBASE_URL}/${path}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); } catch(e){}
}

let saveTimer;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    await dbSet('global',{
      totalClicks:state.totalClicks, uClicks:state.uClicks,
      uIndex:state.uIndex, generation:state.generation, doneUniverses:state.doneUniverses,
      circles:circles.map(c=>({xp:c.xp,yp:c.yp,rp:c.rp})),
      leaderboard:state.leaderboard, messages:state.messages.slice(-20),
      timelineEvents:state.timelineEvents,
    });
  }, 900);
}

// Live sync via SSE
function startLiveSync() {
  if (!FIREBASE_URL) return;
  try {
    const es=new EventSource(`${FIREBASE_URL}/global.json`);
    es.addEventListener('put', e=>{
      try { const d=JSON.parse(e.data); if(d&&d.data) applyRemote(d.data); } catch(_){}
    });
  } catch(_){}
}

function applyRemote(g) {
  if (!g) return;
  let changed=false;
  if (g.totalClicks>state.totalClicks) { state.totalClicks=g.totalClicks; state.uClicks=g.uClicks||state.uClicks; changed=true; }
  if (g.circles&&g.circles.length>circles.length) {
    circles=g.circles.map(c=>({x:c.xp*window.innerWidth,y:c.yp*window.innerHeight,
      r:c.rp*Math.min(window.innerWidth,window.innerHeight),...c}));
    rebuildMask();
  }
  if (g.leaderboard) { state.leaderboard=g.leaderboard; renderLB(); }
  if (g.messages)    { state.messages=g.messages;       renderMessages(); }
  if (g.timelineEvents) { state.timelineEvents=g.timelineEvents; renderTimeline(); }
  if (changed) updateUI();
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    const ids=['lb','tl','msg'];
    b.classList.toggle('active', ids[i]===id);
  });
  document.querySelectorAll('.tab-pane').forEach(p=> p.classList.toggle('active', p.id==='tab-'+id));
}

// ═══════════════════════════════════════
// LEADERBOARD
// ═══════════════════════════════════════
function updateLB() {
  const lb=state.leaderboard; const idx=lb.findIndex(e=>e.n===myName);
  if (idx>=0) lb[idx].s=myClicks; else lb.push({n:myName,s:myClicks});
  lb.sort((a,b)=>b.s-a.s); state.leaderboard=lb.slice(0,8);
  renderLB();
}

function renderLB() {
  const wrap=document.getElementById('lb-rows'); wrap.innerHTML='';
  const rc=['r1','r2','r3'];
  state.leaderboard.slice(0,6).forEach((e,i)=>{
    const isMe=e.n===myName;
    const row=document.createElement('div');
    row.className='lb-row'+(isMe?' me':'')+(i===0?' top':'');
    row.innerHTML=`<span class="lb-rank ${rc[i]||'rx'}">${i+1}</span>
      <span class="lb-name${isMe?' me':''}">${e.n}</span>
      <span class="lb-score">${(e.s||0).toLocaleString()}</span>`;
    wrap.appendChild(row);
  });
}

// ═══════════════════════════════════════
// TIMELINE
// ═══════════════════════════════════════
function recordTimelineEvent(ev) {
  state.timelineEvents.push({ name:ev.name, he:ev.he, color:ev.color, at:state.totalClicks, ts:Date.now() });
  state.timelineEvents=state.timelineEvents.slice(-12);
  renderTimeline();
}

function renderTimeline() {
  const wrap=document.getElementById('tl-wrap'); wrap.innerHTML='';
  // Show past events + upcoming
  const done=[...state.timelineEvents].reverse();
  done.forEach(ev=>{
    const item=document.createElement('div'); item.className='tl-item';
    item.innerHTML=`
      <div class="tl-dot" style="background:${ev.color};color:${ev.color}"></div>
      <div class="tl-content">
        <div class="tl-event-name" style="color:${ev.color}">${ev.name}</div>
        <div class="tl-at">לחיצה #${(ev.at||0).toLocaleString()}</div>
      </div>`;
    wrap.appendChild(item);
  });
  // Next upcoming
  const nextEvs=MILESTONES.filter(m=>m.at>state.uClicks).slice(0,2);
  nextEvs.forEach(ev=>{
    const item=document.createElement('div'); item.className='tl-item tl-future';
    item.innerHTML=`
      <div class="tl-dot" style="background:var(--dim);color:var(--dim)"></div>
      <div class="tl-content">
        <div class="tl-event-name" style="color:var(--dim)">${ev.name}</div>
        <div class="tl-at">עוד ${(ev.at-state.uClicks).toLocaleString()} לחיצות</div>
      </div>`;
    wrap.appendChild(item);
  });
}

// ═══════════════════════════════════════
// MESSAGES
// ═══════════════════════════════════════
function sendMessage() {
  const inp=document.getElementById('msg-input');
  const text=inp.value.trim(); if (!text) return;
  inp.value='';
  const msg={ n:myName, t:text, ts:Date.now() };
  state.messages.push(msg);
  state.messages=state.messages.slice(-20);
  renderMessages();
  scheduleSave();
}

document.getElementById('msg-input').addEventListener('keydown',e=>{ if(e.key==='Enter') sendMessage(); });

function renderMessages() {
  const feed=document.getElementById('msg-feed'); feed.innerHTML='';
  [...state.messages].reverse().slice(0,5).forEach(m=>{
    const el=document.createElement('div'); el.className='msg-item';
    const mins=Math.round((Date.now()-m.ts)/60000);
    const timeStr=mins<1?'עכשיו':mins<60?`לפני ${mins} דק`:'מוקדם יותר';
    el.innerHTML=`<div class="msg-meta"><span class="msg-name">${m.n}</span><span class="msg-time">${timeStr}</span></div>
      <div class="msg-text">${m.t.replace(/</g,'&lt;')}</div>`;
    feed.appendChild(el);
  });
}

// ═══════════════════════════════════════
// COSMIC EVENT
// ═══════════════════════════════════════
function cosmicEvent(ev) {
  const ov=document.getElementById('evt-overlay');
  const en=document.getElementById('ev-name');
  en.textContent=ev.name; en.style.color=ev.color;
  en.style.textShadow=`0 0 60px ${ev.color},0 0 120px ${ev.color},0 0 200px ${ev.color}`;
  document.getElementById('ev-desc').textContent=ev.desc;
  ov.classList.remove('show'); void ov.offsetWidth; ov.classList.add('show');
  setTimeout(()=>ov.classList.remove('show'),4700);
  toast(`✦ ${ev.he} — ${ev.desc}`);
  recordTimelineEvent(ev);
}

// ═══════════════════════════════════════
// BIG BANG
// ═══════════════════════════════════════
async function bigBang() {
  transitioning=true;
  state.doneUniverses++; state.generation++; state.uIndex++;
  const nextName=UNI_NAMES[state.uIndex%UNI_NAMES.length];
  document.getElementById('bb-name').textContent=nextName;
  document.getElementById('bb-sup').textContent=`יקום ${GEN_HE[(state.generation-1)%GEN_HE.length]} נחשף — יקום חדש נולד`;
  const bb=document.getElementById('bigbang');
  bb.classList.add('active');
  document.getElementById('reveal-stage').style.transition='filter 0.3s';
  document.getElementById('reveal-stage').style.filter='brightness(8) saturate(0)';
  await sleep(5200);
  state.uClicks=0; circles=[]; lastMilestone=-1;
  rebuildMask(); loadJWST(state.uIndex);
  document.getElementById('reveal-stage').style.filter='';
  bb.classList.remove('active');
  updateUI(); transitioning=false; scheduleSave();
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ═══════════════════════════════════════
// JWST
// ═══════════════════════════════════════
function loadJWST(idx) {
  const e=JWST[idx%JWST.length];
  imgEl.src=e.url;
  setTimeout(()=>toast(`📡 ${e.name} · NASA/ESA/CSA JWST`),700);
}

// ═══════════════════════════════════════
// VFX
// ═══════════════════════════════════════
function burst(cx,cy) {
  const syms=['✦','·','★','◆','✧'];
  const cols=['#f0d080','#50eeff','#fff','#ff9050','#cc88ff'];
  for (let i=0;i<14;i++) {
    const el=document.createElement('div'); el.className='pt';
    const a=(Math.PI*2/14)*i+(Math.random()-.5)*.6, d=40+Math.random()*90;
    const c=cols[i%cols.length], sz=2+Math.random()*3;
    el.style.cssText=`left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;
      background:${c};box-shadow:0 0 8px ${c},0 0 16px ${c};
      --tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;--d:${.5+Math.random()*.6}s`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),1200);
  }
  for (let i=0;i<6;i++) {
    const el=document.createElement('div'); el.className='star-burst';
    const a=Math.random()*Math.PI*2, d=50+Math.random()*80;
    el.textContent=syms[i%syms.length];
    el.style.cssText=`left:${cx}px;top:${cy}px;
      --tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;--dur:${.7+Math.random()*.5}s`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),1300);
  }
}

function shockwave(x,y) {
  const el=document.createElement('div'); el.className='shockwave';
  el.style.left=x+'px'; el.style.top=y+'px'; el.style.width='20px'; el.style.height='20px';
  document.body.appendChild(el); setTimeout(()=>el.remove(),850);
}

function addRipple() {
  const r=document.getElementById('btn-area').getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const el=document.createElement('div'); el.className='ripple';
  el.style.cssText=`left:${cx}px;top:${cy}px;transform:translate(-50%,-50%);position:fixed;z-index:28;`;
  document.body.appendChild(el); setTimeout(()=>el.remove(),1050);
}

function toast(msg) {
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.getElementById('toasts').appendChild(t); setTimeout(()=>t.remove(),4000);
}

// ═══════════════════════════════════════
// STREAK
// ═══════════════════════════════════════
function tickStreak() {
  const today=new Date().toDateString();
  const last=localStorage.getItem('cv4-lastDate');
  if (last===today) return;
  const yest=new Date(Date.now()-86400000).toDateString();
  state.streak=(last===yest)?(parseInt(localStorage.getItem('cv4-streak')||0)+1):1;
  localStorage.setItem('cv4-streak',state.streak);
  localStorage.setItem('cv4-lastDate',today);
}

// ═══════════════════════════════════════
// UI UPDATE
// ═══════════════════════════════════════
function bump(id){ const el=document.getElementById(id); el.classList.add('bump'); setTimeout(()=>el.classList.remove('bump'),130); }

function updateUI() {
  const pct=(state.uClicks/UNIVERSE_TARGET)*100;
  document.getElementById('uni-name').textContent=UNI_NAMES[state.uIndex%UNI_NAMES.length];
  document.getElementById('uni-gen').textContent=`דור ${GEN_HE[state.generation%GEN_HE.length]}`;
  document.getElementById('s-clicks').textContent=state.totalClicks.toLocaleString('he-IL');
  document.getElementById('s-pct').textContent=Math.floor(pct)+'%';
  document.getElementById('s-uni').textContent=state.doneUniverses;
  document.getElementById('streak-n').textContent=parseInt(localStorage.getItem('cv4-streak')||0);
  document.getElementById('live-count').textContent=(6+Math.floor(state.totalClicks/55)).toLocaleString('he-IL');
  document.getElementById('prog-fill').style.width=pct+'%';

  const next=MILESTONES.find(m=>m.at>state.uClicks);
  document.getElementById('prog-next').textContent=next?`עוד ${(next.at-state.uClicks).toLocaleString()} ← ${next.name}`:'✦ כמעט שם!';

  const dotsWrap=document.getElementById('prog-dots'); dotsWrap.innerHTML='';
  MILESTONES.slice(0,-1).forEach(m=>{
    const d=document.createElement('div');
    d.className='m-dot'+(state.uClicks>=m.at?' done':'');
    d.style.left=(m.at/UNIVERSE_TARGET*100)+'%'; dotsWrap.appendChild(d);
  });

  const fog=0.97-(pct/100)*0.82;
  document.getElementById('vignette').style.background=
    `radial-gradient(ellipse 80% 80% at 50% 50%,transparent 0%,rgba(0,0,12,${fog*.5}) 52%,rgba(0,0,12,${fog}) 100%)`;
}

// ═══════════════════════════════════════
// ANTI-CHEAT
// ═══════════════════════════════════════
function allowed() {
  const now=Date.now();
  if (now-lastClickTime<MIN_MS) return false;
  if (now-secStart>1000){ clicksThisSec=0; secStart=now; }
  if (clicksThisSec>=MAX_CPS) return false;
  lastClickTime=now; clicksThisSec++;
  return true;
}

// ═══════════════════════════════════════
// CLICK
// ═══════════════════════════════════════
const btnEl=document.getElementById('btn');
btnEl.addEventListener('click', async e=>{
  if (transitioning||!allowed()) return;
  state.totalClicks++; state.uClicks++; myClicks++;
  localStorage.setItem('cv4-myClicks',myClicks);
  tickStreak();
  addRevealCircle();

  const r=btnEl.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  burst(cx,cy); shockwave(cx,cy); addRipple();
  btnEl.classList.remove('clicked'); void btnEl.offsetWidth; btnEl.classList.add('clicked');
  bump('s-clicks'); bump('s-pct');

  for (const ev of MILESTONES) {
    if (state.uClicks>=ev.at&&lastMilestone<ev.at&&ev.at<UNIVERSE_TARGET) {
      lastMilestone=ev.at; cosmicEvent(ev); break;
    }
  }
  if (state.uClicks>=UNIVERSE_TARGET) {
    cosmicEvent(MILESTONES[MILESTONES.length-1]);
    await sleep(3500); await bigBang(); return;
  }
  updateUI(); updateLB(); scheduleSave();
});

// ═══════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════
window.addEventListener('resize',()=>{ resizeMask(); updateUI(); });

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
async function init() {
  // Name
  myName=localStorage.getItem('cv4-name');
  if (!myName){ myName='חוקר-'+Math.floor(1000+Math.random()*8999); localStorage.setItem('cv4-name',myName); }
  myClicks=parseInt(localStorage.getItem('cv4-myClicks')||0);

  resizeMask();

  // Load remote state
  const saved=await dbGet('global');
  if (saved) {
    Object.assign(state,saved);
    if (saved.circles) {
      circles=saved.circles.map(c=>({x:c.xp*window.innerWidth,y:c.yp*window.innerHeight,
        r:c.rp*Math.min(window.innerWidth,window.innerHeight),...c}));
      rebuildMask();
    }
    if (saved.leaderboard){ state.leaderboard=saved.leaderboard; renderLB(); }
    if (saved.messages)   { state.messages=saved.messages;       renderMessages(); }
    if (saved.timelineEvents){ state.timelineEvents=saved.timelineEvents; renderTimeline(); }
  }

  lastMilestone=Math.max(-1,...MILESTONES.filter(m=>state.uClicks>=m.at&&m.at<UNIVERSE_TARGET).map(m=>m.at));
  loadJWST(state.uIndex);
  updateUI(); updateLB(); renderTimeline();
  startLiveSync();

  setTimeout(()=>{ document.getElementById('load').classList.add('out'); setTimeout(()=>document.getElementById('load').remove(),1000); },1000);
}

init();
</script>
</body>
</html>
